<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e14">
    <title>Neural Cloud</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --accent: #00ffcc;
            --gold: #ffcc00;
            --bg: #0b0e14;
            --panel: rgba(18,22,30,0.96);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.18);
            --text-primary: #f0f0f0;
            --text-secondary: #aab;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-primary);
            font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #graph { width: 100vw; height: 100dvh; touch-action: none; }

        /* === Graph Elements === */
        .link { stroke: #333; stroke-opacity: 0.4; stroke-width: 1.2px; pointer-events: none; }
        .node { stroke: #fff; stroke-width: 1px; cursor: pointer; transition: all 0.25s ease; }
        .node.selected { stroke: var(--gold); stroke-width: 3px; filter: drop-shadow(0 0 10px var(--gold)); }
        .node.highlighted { stroke: var(--accent); stroke-width: 2px; filter: drop-shadow(0 0 8px var(--accent)); }

        .label-bg {
            fill: rgba(0,0,0,0.75); rx: 8; ry: 8;
            opacity: 0; pointer-events: none;
            stroke: var(--border); stroke-width: 0.5px;
            transition: opacity 0.25s ease;
        }
        .label-text {
            font-size: 12px; pointer-events: none;
            fill: #fff; opacity: 0;
            transition: opacity 0.25s ease;
        }
        .node-group.focused .label-bg, .node-group.focused .label-text,
        .node-group.selected .label-bg, .node-group.selected .label-text { opacity: 1 !important; }

        /* === Controls === */
        #controls-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 100; max-width: calc(100vw - 40px);
        }

        #search-input {
            width: 300px; max-width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: #fff; font-size: 14px;
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            backdrop-filter: blur(12px);
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.12);
        }
        #search-input::placeholder { color: var(--text-secondary); }

        .glass-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-md);
            backdrop-filter: blur(12px);
        }

        .config-title {
            font-size: 11px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.2px;
            margin-bottom: 12px; font-weight: 600;
        }

        .filter-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary);
            padding: 6px 0; cursor: pointer;
            transition: color var(--transition-fast);
        }
        .filter-label:hover { color: var(--text-primary); }
        .filter-label input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* === Color Picker === */
        .color-picker { display: flex; gap: 10px; }
        .color-circle {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .color-circle:hover { transform: scale(1.15); }
        .color-circle.active {
            border-color: #fff; transform: scale(1.2);
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
        }

        /* === Preview Panel (Desktop) === */
        #preview-panel {
            position: absolute; top: 16px; right: -900px;
            width: 480px; height: calc(100dvh - 32px);
            background: var(--panel); border: 1px solid var(--border);
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1), width 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: -12px 0 40px rgba(0,0,0,0.5);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(25px);
            z-index: 1000;
        }
        #preview-panel.open { right: 16px; }

        #resizer {
            position: absolute; left: -2px; top: 0;
            width: 8px; height: 100%;
            cursor: ew-resize; background: transparent;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 12px;
        }
        .panel-header-top {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        #panel-filepath {
            font-size: 11px; color: var(--text-secondary);
            opacity: 0.6; margin: 4px 0 0 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: opacity var(--transition-fast);
        }
        #panel-filepath:hover { opacity: 1; }

        .panel-header-top h2 {
            margin: 0; font-size: 16px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }

        .actions-bar { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 8px 16px; font-size: 12px; font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all var(--transition-fast);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            text-decoration: none;
            white-space: nowrap;
            line-height: 1.4;
        }
        .btn:hover {
            background: var(--accent); color: #000;
            border-color: var(--accent);
        }
        .btn:active { transform: scale(0.96); }
        .btn-close {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            color: var(--text-primary);
        }

        .panel-content {
            padding: 24px; overflow-y: auto; flex: 1;
            font-size: 15px; line-height: 1.75; color: #ddd;
            -webkit-overflow-scrolling: touch;
        }
        .panel-content img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
        .panel-content pre { overflow-x: auto; border-radius: var(--radius-sm); }
        .panel-content code { font-size: 13px; }

        /* === Mobile Overlay === */
        #panel-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0; transition: opacity 0.25s ease;
        }
        #panel-overlay.visible { display: block; opacity: 1; }

        /* === Mobile Responsive === */
        @media (max-width: 768px) {
            #controls-container {
                top: 12px; left: 12px; right: auto;
                max-width: 260px;
            }
            #search-input { width: 100%; font-size: 16px; }

            .glass-box { padding: 12px; }
            .filter-label { font-size: 14px; padding: 8px 0; }

            #preview-panel {
                top: auto; bottom: 0; right: 0; left: 0;
                width: 100% !important;
                height: 70dvh;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            }
            #preview-panel.open {
                right: 0;
                transform: translateY(0);
            }

            #resizer { display: none; }

            .panel-header { padding: 16px; }
            .panel-header::before {
                content: '';
                display: block; width: 36px; height: 4px;
                background: rgba(255,255,255,0.2);
                border-radius: 2px;
                margin: 0 auto 12px;
            }
            .panel-content { padding: 16px; font-size: 15px; }

            .btn { padding: 10px 18px; font-size: 13px; }
        }

        /* === Loading State === */
        .panel-loading {
            display: flex; align-items: center; justify-content: center;
            height: 120px; color: var(--text-secondary);
        }
        .panel-loading::after {
            content: ''; width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* === Settings Button === */
        #settings-btn {
            position: fixed; bottom: 24px; right: 24px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all var(--transition-fast);
            z-index: 200;
        }
        #settings-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(45deg); }
        #settings-btn:active { transform: scale(0.92); }

        body.guest-mode #settings-btn,
        body.guest-mode #node-config {
            display: none !important;
        }
        body.guest-mode #panel-filepath.is-hidden {
            display: none;
        }

        .node.search-highlight {
            animation: pulse-highlight 1.5s ease-out;
        }
        @keyframes pulse-highlight {
            0% { filter: drop-shadow(0 0 0px var(--accent)); }
            30% { filter: drop-shadow(0 0 18px var(--accent)); }
            100% { filter: drop-shadow(0 0 4px var(--accent)); }
        }

        /* === Search Dropdown === */
        .search-wrapper { position: relative; }
        #search-dropdown {
            display: none; position: absolute;
            top: calc(100% + 4px); left: 0; right: 0;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(16px);
            max-height: 320px; overflow-y: auto;
            z-index: 150;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            -webkit-overflow-scrolling: touch;
        }
        #search-dropdown.open { display: block; }
        .search-item {
            padding: 10px 16px;
            font-size: 13px; color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover, .search-item.active {
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
        }
        .search-item .match-highlight {
            color: var(--accent); font-weight: 600;
        }
        .search-item .search-group {
            font-size: 11px; color: var(--text-secondary);
            opacity: 0.6; margin-left: auto; white-space: nowrap;
        }
        .search-no-result {
            padding: 14px 16px;
            font-size: 13px; color: var(--text-secondary);
            text-align: center;
        }

        /* === Folder Browser Modal === */
        #folder-browser-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 2100;
            justify-content: center; align-items: center;
        }
        #folder-browser-overlay.open { display: flex; }
        #folder-browser {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: var(--radius-lg); width: 460px; max-width: 94vw;
            max-height: 70vh; display: flex; flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .fb-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .fb-header h4 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .fb-path {
            padding: 8px 18px; font-size: 11px; color: var(--text-secondary);
            font-family: 'Courier New', monospace;
            border-bottom: 1px solid var(--border);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .fb-list {
            flex: 1; overflow-y: auto; padding: 6px 0;
            -webkit-overflow-scrolling: touch;
        }
        .fb-item {
            padding: 9px 18px; font-size: 13px; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: background var(--transition-fast);
        }
        .fb-item:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
        .fb-file { color: var(--accent); }
        .fb-item .fb-icon { font-size: 15px; }
        .fb-item.fb-parent { color: var(--accent); font-weight: 500; }
        .fb-footer {
            padding: 12px 18px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .fb-footer .btn { font-size: 12px; padding: 6px 16px; }
        .fb-empty { padding: 20px; text-align: center; font-size: 13px; color: var(--text-secondary); }
        @media (max-width: 768px) {
            #folder-browser { width: 100%; max-width: 100%; max-height: 80vh; border-radius: var(--radius-lg) var(--radius-lg) 0 0; align-self: flex-end; }
        }

        /* === Settings Modal === */
        #settings-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        #settings-overlay.open { display: flex; }

        #settings-modal {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 480px; max-width: calc(100vw - 32px);
            max-height: calc(100dvh - 64px);
            display: flex; flex-direction: column;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .settings-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .settings-header h3 { margin: 0; font-size: 16px; font-weight: 600; }

        .settings-body {
            padding: 20px 24px;
            overflow-y: auto; flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .settings-section { margin-bottom: 20px; }
        .settings-section-title {
            font-size: 11px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.2px;
            font-weight: 600; margin-bottom: 10px;
        }

        .path-list { list-style: none; margin: 0; padding: 0; }
        .path-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; margin-bottom: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px; color: var(--text-primary);
            word-break: break-all;
        }
        .path-item span { flex: 1; min-width: 0; }
        .path-item button {
            background: none; border: none;
            color: #e74c3c; cursor: pointer;
            font-size: 16px; padding: 4px 8px;
            border-radius: 4px;
            transition: background var(--transition-fast);
            flex-shrink: 0;
        }
        .path-item button:hover { background: rgba(231,76,60,0.15); }

        .path-add-row {
            display: flex; gap: 8px; margin-top: 8px;
        }
        .path-add-row input {
            flex: 1; padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff; font-size: 13px;
            outline: none;
        }
        .path-add-row input:focus { border-color: var(--accent); }
        .path-add-row button {
            padding: 10px 16px;
            background: rgba(0,255,204,0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: var(--radius-sm);
            cursor: pointer; font-size: 13px; font-weight: 500;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }
        .path-add-row button:hover { background: var(--accent); color: #000; }

        .settings-input {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff; font-size: 13px;
            outline: none;
        }
        .settings-input:focus { border-color: var(--accent); }

        .settings-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex; gap: 8px; justify-content: flex-end;
        }

        .settings-toast {
            position: fixed; bottom: 80px; right: 24px;
            padding: 10px 20px;
            background: var(--accent); color: #000;
            border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 500;
            opacity: 0; transition: opacity 0.25s ease;
            z-index: 3000;
        }
        .settings-toast.show { opacity: 1; }

        @media (max-width: 768px) {
            #settings-btn {
                bottom: calc(16px + env(safe-area-inset-bottom, 0px));
                right: 16px;
            }
            #settings-modal {
                width: 100%; max-width: 100%;
                height: 100dvh; max-height: 100dvh;
                border-radius: 0;
            }
            .settings-toast {
                bottom: calc(72px + env(safe-area-inset-bottom, 0px));
                right: 16px; left: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="controls-container">
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search Neural Synapses..." autocomplete="off">
            <div id="search-dropdown"></div>
        </div>
        <div class="glass-box">
            <div class="config-title">Filters</div>
            <div id="filter-list"></div>
            
            <div id="node-config" style="display:none; border-top: 1px solid var(--border); margin-top:12px; padding-top:12px;">
                <div class="config-title">Node Color</div>
                <div class="color-picker" id="node-color-picker">
                    <div class="color-circle" data-color="#42b983" style="background:#42b983" role="button" aria-label="Green"></div>
                    <div class="color-circle" data-color="#3498db" style="background:#3498db" role="button" aria-label="Blue"></div>
                    <div class="color-circle" data-color="#e74c3c" style="background:#e74c3c" role="button" aria-label="Red"></div>
                    <div class="color-circle" data-color="#9b59b6" style="background:#9b59b6" role="button" aria-label="Purple"></div>
                    <div class="color-circle" data-color="#f1c40f" style="background:#f1c40f" role="button" aria-label="Yellow"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-overlay" onclick="closePanel()"></div>
    <div id="preview-panel">
        <div id="resizer"></div>
        <div class="panel-header">
            <div class="panel-header-top">
                <div style="min-width:0;flex:1">
                    <h2 id="panel-title"></h2>
                    <div id="panel-filepath" title="Click to copy"></div>
                </div>
                <button class="btn btn-close" onclick="closePanel()" aria-label="Close panel">CLOSE</button>
            </div>
            <div class="actions-bar">
                <a id="btn-raw-pdf" class="btn" target="_blank" style="display:none; color:var(--gold); border-color:var(--gold);">VIEW PDF</a>
                <button class="btn btn-reset-width" onclick="resetWidth()">RESET WIDTH</button>
            </div>
        </div>
        <div id="panel-body" class="panel-content">Select a node...</div>
    </div>
    
    <svg id="graph"></svg>

    <!-- Settings Button -->
    <button id="settings-btn" onclick="openSettings()" aria-label="Settings">&#9881;</button>

    <!-- Settings Modal -->
    <div id="settings-overlay" onclick="if(event.target===this)closeSettings()">
        <div id="settings-modal">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="btn btn-close" onclick="closeSettings()">CLOSE</button>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <div class="settings-section-title">Scan Paths</div>
                    <ul class="path-list" id="path-list"></ul>
                    <div class="path-add-row">
                        <input type="text" id="new-path-input" placeholder="Enter path, e.g. ~/notes">
                        <button onclick="openFolderBrowser('scan')" title="Browse">&#128193;</button>
                        <button onclick="addPath()">Add</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">Core Memory File</div>
                    <div style="display:flex;gap:6px">
                        <input type="text" class="settings-input" id="core-mem-input" placeholder="e.g. ~/.openclaw/workspace/MEMORY.md" style="flex:1">
                        <button class="btn" style="font-size:12px;padding:6px 10px;white-space:nowrap" onclick="openFolderBrowser('core')" title="Browse">&#128193;</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">Preferences</div>
                    <label class="path-item" style="cursor:pointer">
                        <input type="checkbox" id="prefer-pdf-checkbox" style="margin-right:8px">
                        <span>Prefer PDF over Markdown (show PDF when available)</span>
                    </label>
                </div>
            </div>
            <div class="settings-footer">
                <button class="btn" onclick="closeSettings()">Cancel</button>
                <button class="btn" style="background:var(--accent);color:#000;border-color:var(--accent)" onclick="saveSettings()">Save</button>
                <button class="btn" style="background:#ff6b6b;color:#fff;border-color:#ff6b6b" onclick="restartBackend()" title="Restart backend server">&#128260; Restart</button>
            </div>
        </div>
    </div>
    <div class="settings-toast" id="settings-toast"></div>

    <!-- Folder Browser Modal -->
    <div id="folder-browser-overlay" onclick="if(event.target===this)closeFolderBrowser()">
        <div id="folder-browser">
            <div class="fb-header">
                <h4>Select Folder</h4>
                <button class="btn btn-close" onclick="closeFolderBrowser()" style="font-size:11px;padding:4px 10px">CLOSE</button>
            </div>
            <div class="fb-path" id="fb-current-path">Loading...</div>
            <div class="fb-list" id="fb-list"></div>
            <div class="fb-footer">
                <button class="btn" onclick="closeFolderBrowser()">Cancel</button>
                <button class="btn" style="background:var(--accent);color:#000;border-color:var(--accent)" onclick="selectCurrentFolder()">Select This Folder</button>
            </div>
        </div>
    </div>

    <script>
        const svg = d3.select("#graph"), width = window.innerWidth, height = window.innerHeight;
        const g = svg.append("g");
        const panel = document.getElementById("preview-panel");
        const appState = {
            isGuestMode: window.location.pathname === '/guest',
            publicConfig: null,
            uiConfig: {
                site_title: 'Neural Cloud',
                guest_enabled: true,
                guest_title: '',
                guest_subtitle: 'Read-only access to the knowledge graph.',
                show_file_paths_in_guest: false
            }
        };
        let allNodesData = [], allLinksData = [], curNodes = [], curLinks = [], selectedId = null;
        const markdownSanitizeConfig = {
            USE_PROFILES: { html: true },
            FORBID_TAGS: ["script", "style", "iframe", "object", "embed", "form", "input", "button", "textarea", "select", "option", "link", "meta"],
            ALLOW_UNKNOWN_PROTOCOLS: false
        };

        function setPanelLoading(container) {
            container.replaceChildren();
            const loading = document.createElement('div');
            loading.className = 'panel-loading';
            container.appendChild(loading);
        }

        function setPanelMessage(container, message) {
            container.replaceChildren();
            const text = document.createElement('p');
            text.style.color = 'var(--text-secondary)';
            text.textContent = message;
            container.appendChild(text);
        }

        function renderPdfPreview(container, pdfUrl) {
            container.replaceChildren();

            const info = document.createElement('div');
            info.style.textAlign = 'center';
            info.style.padding = '10px';
            info.style.color = 'var(--text-secondary)';
            info.style.fontSize = '12px';
            info.style.borderBottom = '1px solid var(--border)';
            info.style.marginBottom = '10px';
            info.append('PDF Mode: ');

            const link = document.createElement('a');
            link.href = pdfUrl;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.style.color = 'var(--accent)';
            link.textContent = 'Open in new tab';
            info.appendChild(link);

            const frame = document.createElement('iframe');
            frame.src = pdfUrl;
            frame.style.width = '100%';
            frame.style.height = 'calc(100vh - 200px)';
            frame.style.border = 'none';
            frame.style.borderRadius = '8px';
            frame.style.background = '#fff';

            container.appendChild(info);
            container.appendChild(frame);
        }

        function renderMarkdown(container, markdown) {
            const rawHtml = marked.parse(markdown);
            const sanitizedHtml = window.DOMPurify
                ? DOMPurify.sanitize(rawHtml, markdownSanitizeConfig)
                : rawHtml
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            container.innerHTML = sanitizedHtml;
            container.querySelectorAll('a[target="_blank"]').forEach(a => {
                a.rel = 'noopener noreferrer';
            });
            container.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
        }

        function createEmptyState(message, className = 'fb-empty') {
            const el = document.createElement('div');
            el.className = className;
            el.textContent = message;
            return el;
        }

        function createFolderItem({ label, icon, className = '', onClick }) {
            const item = document.createElement('div');
            item.className = `fb-item${className ? ` ${className}` : ''}`;
            item.addEventListener('click', onClick);

            const iconEl = document.createElement('span');
            iconEl.className = 'fb-icon';
            iconEl.textContent = icon;

            const textEl = document.createElement('span');
            textEl.textContent = label;

            item.appendChild(iconEl);
            item.appendChild(textEl);
            return item;
        }

        function normalizeSearchText(text) {
            return (text || '')
                .toLowerCase()
                .replace(/[^0-9a-z\u4e00-\u9fff]+/gi, '');
        }

        function buildSearchProjection(text) {
            const original = text || '';
            const normalizedChars = [];
            const indexMap = [];

            for (let i = 0; i < original.length; i++) {
                const char = original[i];
                if (/[0-9a-z\u4e00-\u9fff]/i.test(char)) {
                    normalizedChars.push(char.toLowerCase());
                    indexMap.push(i);
                }
            }

            return {
                original,
                normalized: normalizedChars.join(''),
                indexMap
            };
        }

        function applyUiConfig(uiConfig = {}, publicConfig = {}) {
            appState.uiConfig = { ...appState.uiConfig, ...uiConfig };
            document.title = appState.uiConfig.site_title || 'Neural Cloud';

            const searchInput = document.getElementById('search-input');
            const restartBtn = document.querySelector('.settings-footer button[onclick="restartBackend()"]');
            const filepath = document.getElementById('panel-filepath');
            searchInput.placeholder = 'Search Neural Synapses...';

            if (appState.isGuestMode) {
                document.body.classList.add('guest-mode');
                filepath.classList.toggle('is-hidden', !appState.uiConfig.show_file_paths_in_guest);
            } else {
                document.body.classList.remove('guest-mode');
                filepath.classList.remove('is-hidden');
            }

            if (restartBtn) {
                restartBtn.style.display = publicConfig.allow_restart ? '' : 'none';
            }
        }

        async function loadPublicConfig(force = false) {
            if (appState.publicConfig && !force) {
                return appState.publicConfig;
            }
            const res = await fetch('/api/config');
            if (!res.ok) {
                throw new Error('Failed to load config');
            }
            const config = await res.json();
            appState.publicConfig = config;
            applyUiConfig(config.ui || {}, config);
            return config;
        }

        const GRAPH_FORCES = {
            linkDistance: 150,
            linkStrength: 0.22,
            chargeStrength: -320,
            collisionPadding: 20
        };

        let simulation = d3.forceSimulation()
            .force("link", d3.forceLink()
                .id(d => d.id)
                .distance(GRAPH_FORCES.linkDistance)
                .strength(GRAPH_FORCES.linkStrength))
            .force("charge", d3.forceManyBody().strength(GRAPH_FORCES.chargeStrength))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => (d.r || 8) + GRAPH_FORCES.collisionPadding));

        let groupLabels = {};

        async function initApp() {
            try {
                await loadPublicConfig();
            } catch (err) {
                applyUiConfig();
            }

            const graph = await d3.json("/api/graph");
            groupLabels = graph.groups || {};
            buildFilterUI(groupLabels);

            const MEMORY_RADIUS = 22;
            const sizes = graph.nodes.map(n => n.size || 0);
            const maxSize = Math.max(...sizes, 1);
            const sizeScale = d3.scaleSqrt().domain([0, maxSize]).range([5, MEMORY_RADIUS - 2]).clamp(true);
            allNodesData = graph.nodes.map(n => ({...n, customColor: null, r: n.id === 'MEMORY' ? MEMORY_RADIUS : sizeScale(n.size || 0)}));
            allLinksData = graph.links;
            updateFilter();
            setupInteractions();
        }

        initApp().catch(() => {
            setPanelMessage(document.getElementById('panel-body'), 'Failed to initialize graph.');
        });

        function renderGraph(nodes, links) {
            const linkSelection = g.selectAll(".link").data(links, d => (d.source.id || d.source) + "-" + (d.target.id || d.target));
            linkSelection.exit().remove();
            const link = linkSelection.enter().insert("line", ":first-child").attr("class", "link").merge(linkSelection);

            const groupSelection = g.selectAll(".node-group").data(nodes, d => d.id);
            groupSelection.exit().remove();
            const nodeGroup = groupSelection.enter().append("g").attr("class", "node-group")
                .on("click", (e, d) => selectNode(d, e.currentTarget))
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
                .merge(groupSelection);

            nodeGroup.each(function(d) {
                const el = d3.select(this);
                if (el.select("circle").empty()) {
                    el.append("circle").attr("class", "node");
                    el.append("rect").attr("class", "label-bg");
                    el.append("text").attr("class", "label-text").attr("dx", 18).attr("dy", 4);
                }
                
                el.select("circle")
                    .attr("r", d.r || 8)
                    .attr("fill", d.customColor || (d.id === "MEMORY" ? "var(--gold)" : (d.group === 0 ? "var(--gold)" : (d.group % 2 === 1 ? "#42b983" : "#3498db"))))
                    .classed("selected", d.id === selectedId);

                el.select("text").text(d.id.length > 25 ? d.id.substr(0,22)+'...' : d.id);
                const bbox = el.select("text").node().getBBox();
                el.select("rect").attr("x", bbox.x - 6).attr("y", bbox.y - 3).attr("width", bbox.width + 12).attr("height", bbox.height + 6);
            });

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(0.3).restart();

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function selectNode(d, el) {
            selectedId = d.id;
            d3.selectAll(".node-group").classed("selected", false);
            d3.select(el).classed("selected", true);

            // Pulse highlight animation on click
            const circle = d3.select(el).select('circle');
            circle.classed('search-highlight', false);
            void circle.node().offsetWidth;
            circle.classed('search-highlight', true);
            setTimeout(() => circle.classed('search-highlight', false), 1500);
            
            const config = document.getElementById("node-config");
            config.style.display = appState.isGuestMode ? "none" : "block";
            
            // Sync active color
            document.querySelectorAll(".color-circle").forEach(c => {
                c.classList.toggle("active", c.getAttribute("data-color") === d.customColor);
            });

            openNode(d.id);
        }

        function setupInteractions() {
            // Fix Color Picker
            document.querySelectorAll(".color-circle").forEach(c => {
                c.onclick = (e) => {
                    e.stopPropagation();
                    const color = c.getAttribute("data-color");
                    const node = allNodesData.find(n => n.id === selectedId);
                    if (node) {
                        node.customColor = (node.customColor === color) ? null : color;
                        renderGraph(curNodes, curLinks);
                        // Refresh picker UI
                        document.querySelectorAll(".color-circle").forEach(cc => {
                            cc.classList.toggle("active", cc.getAttribute("data-color") === node.customColor);
                        });
                    }
                };
            });

            ["filter-core","filter-logs","filter-assets"].forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener("change", updateFilter); });
            document.getElementById("search-input").oninput = (e) => {
                const term = e.target.value.trim();
                updateSearchDropdown(term);
            };
            document.getElementById("search-input").addEventListener('focus', () => {
                const term = document.getElementById("search-input").value.trim();
                if (term) updateSearchDropdown(term);
            });
            // Close dropdown on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrapper')) {
                    document.getElementById('search-dropdown').classList.remove('open');
                }
            });
        }

        const isMobile = () => window.innerWidth <= 768;
        const overlay = document.getElementById("panel-overlay");

        async function openNode(id) {
            panel.classList.add("open");
            if (isMobile()) overlay.classList.add("visible");
            document.getElementById("panel-title").innerText = id;
            const pdfBtn = document.getElementById("btn-raw-pdf"); pdfBtn.style.display = "none";
            const body = document.getElementById("panel-body");
            setPanelLoading(body);

            try {
                const response = await fetch(`/api/content/stream?id=` + encodeURIComponent(id));
                if (!response.ok || !response.body) {
                    setPanelMessage(body, 'Failed to load content.');
                    return;
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let mdAccumulated = '';
                let firstChunk = true;
                let isPdf = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // Process complete NDJSON lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete line in buffer

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const msg = JSON.parse(line);
                            if (msg.type === 'meta') {
                                if (msg.pdf_link) {
                                    pdfBtn.href = msg.pdf_link;
                                    pdfBtn.style.display = 'inline-flex';
                                }
                                isPdf = Boolean(msg.is_pdf && msg.pdf_link);
                                if (isPdf) {
                                    renderPdfPreview(body, msg.pdf_link);
                                }
                                const fpEl = document.getElementById('panel-filepath');
                                const showPath = !appState.isGuestMode || appState.uiConfig.show_file_paths_in_guest;
                                fpEl.classList.toggle('is-hidden', !showPath);
                                fpEl.textContent = showPath ? (msg.display_path || '') : '';
                                fpEl.title = showPath && msg.display_path ? 'Click to copy: ' + msg.display_path : '';
                            } else if (msg.type === 'chunk') {
                                mdAccumulated += msg.content;
                                if (!isPdf) {
                                    renderMarkdown(body, mdAccumulated);
                                }
                                if (firstChunk) {
                                    firstChunk = false;
                                    body.scrollTop = 0;
                                }
                            } else if (msg.type === 'done') {
                                if (!isPdf) {
                                    renderMarkdown(body, mdAccumulated);
                                    if (window.MathJax) MathJax.typesetPromise();
                                    interceptMdLinks(body);
                                }
                            } else if (msg.type === 'error') {
                                setPanelMessage(body, `Error: ${msg.error}`);
                            }
                        } catch (e) { /* skip malformed line */ }
                    }
                }
            } catch (err) {
                setPanelMessage(body, 'Failed to load content.');
            }
        }

        function interceptMdLinks(container) {
            container.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (!href) return;
                // Match .md links (relative or absolute)
                if (href.endsWith('.md') || href.match(/\.md[#?]/)) {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        // Extract filename without path and extension, decode URI
                        let name = decodeURIComponent(href).split('/').pop().split('#')[0].split('?')[0].replace('.md', '');
                        // Check if node exists
                        const target = allNodesData.find(n => n.id === name || n.id.toLowerCase() === name.toLowerCase());
                        if (target) {
                            openNode(target.id);
                            // Also zoom to it
                            const k = 2.5;
                            const x = width / 2 - target.x * k;
                            const y = height / 2 - target.y * k;
                            svg.transition().duration(800).call(
                                d3.zoom().transform,
                                d3.zoomIdentity.translate(x, y).scale(k)
                            );
                        } else {
                            // Node not in graph, show toast
                            showToast('Node not found: ' + name, true);
                        }
                    });
                    a.style.cursor = 'pointer';
                    a.title = 'Open node: ' + href.split('/').pop().replace('.md', '');
                }
            });
        }

        function buildFilterUI(groups) {
            const container = document.getElementById("filter-list");
            container.replaceChildren();
            const groupColors = ['var(--gold)', '#42b983', '#3498db', '#e74c3c', '#9b59b6', '#f1c40f'];
            Object.entries(groups).forEach(([gid, label]) => {
                const el = document.createElement('label');
                el.className = 'filter-label';
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.dataset.group = gid;
                input.checked = true;
                input.addEventListener('change', updateFilter);

                const dot = document.createElement('span');
                dot.style.display = 'inline-block';
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.borderRadius = '50%';
                dot.style.background = groupColors[gid] || '#888';
                dot.style.marginRight = '4px';

                const text = document.createTextNode(label);

                el.appendChild(input);
                el.append(' ');
                el.appendChild(dot);
                el.appendChild(text);
                container.appendChild(el);
            });
        }

        function updateFilter() {
            const checkedGroups = new Set();
            document.querySelectorAll('#filter-list input[type=checkbox]').forEach(cb => {
                if (cb.checked) checkedGroups.add(Number(cb.dataset.group));
            });
            curNodes = allNodesData.filter(n => checkedGroups.has(n.group));
            const ids = new Set(curNodes.map(n => n.id));
            curLinks = JSON.parse(JSON.stringify(allLinksData)).filter(l => ids.has(l.source) && ids.has(l.target));
            renderGraph(curNodes, curLinks);
        }

        function closePanel() {
            panel.classList.remove("open");
            overlay.classList.remove("visible");
            selectedId = null;
            d3.selectAll(".node-group").classed("selected", false);
            document.getElementById("node-config").style.display = "none";
        }
        function resetWidth() { if (!isMobile()) panel.style.width = "480px"; }
        let isR = false; resizer.onmousedown = () => isR = true;
        document.onmousemove = (e) => { if(!isR)return; const nw = window.innerWidth - e.clientX; if(nw>300 && nw < window.innerWidth*0.8) panel.style.width = nw+"px"; };
        document.onmouseup = () => isR = false;

        svg.call(d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => {
            g.attr("transform", e.transform);
            const {k,x,y} = e.transform;
            g.selectAll(".node-group").each(function(d){
                const sx = d.x*k+x, sy = d.y*k+y;
                const vis = k>=1.8 && Math.abs(sx-width/2)<width*0.22 && Math.abs(sy-height/2)<height*0.22;
                d3.select(this).classed("focused", d.id === selectedId || vis);
            });
        }));

        function dragstarted(e,d){ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
        function dragged(e,d){ d.fx=e.x; d.fy=e.y; }
        function dragended(e,d){ if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

        // === Settings Panel Logic ===
        let _settingsPaths = [];

        async function openSettings() {
            if (appState.isGuestMode) {
                showToast('Guest mode is read-only');
                return;
            }
            try {
                const config = await loadPublicConfig(true);
                _settingsPaths = [...(config.scan_paths || [])];
                document.getElementById('core-mem-input').value = config.core_memory_file || '';
                document.getElementById('prefer-pdf-checkbox').checked = config.prefer_pdf || false;
                renderPathList();
                document.getElementById('settings-overlay').classList.add('open');
            } catch (err) {
                showToast('Failed to load config');
            }
        }

        function closeSettings() {
            document.getElementById('settings-overlay').classList.remove('open');
        }

        function renderPathList() {
            const list = document.getElementById('path-list');
            list.replaceChildren();
            _settingsPaths.forEach((p, i) => {
                const li = document.createElement('li');
                li.className = 'path-item';
                const text = document.createElement('span');
                text.textContent = p;
                const button = document.createElement('button');
                button.setAttribute('aria-label', 'Remove');
                button.textContent = '×';
                button.addEventListener('click', () => removePath(i));
                li.appendChild(text);
                li.appendChild(button);
                list.appendChild(li);
            });
        }

        function addPath() {
            const input = document.getElementById('new-path-input');
            const val = input.value.trim();
            if (val && !_settingsPaths.includes(val)) {
                _settingsPaths.push(val);
                renderPathList();
                input.value = '';
            }
        }

        function removePath(index) {
            _settingsPaths.splice(index, 1);
            renderPathList();
        }

        async function saveSettings() {
            const config = {
                scan_paths: _settingsPaths,
                core_memory_file: document.getElementById('core-mem-input').value.trim(),
                prefer_pdf: document.getElementById('prefer-pdf-checkbox').checked
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await res.json();
                if (data.ok) {
                    closeSettings();
                    showToast('Config saved. Refreshing...');
                    setTimeout(() => refreshGraph(), 500);
                } else {
                    showToast('Error: ' + (data.error || 'Unknown'));
                }
            } catch (err) {
                showToast('Save failed');
            }
        }

        async function restartBackend() {
            if (!confirm('Restart backend server?\n\nNote: Current page will reload automatically.')) return;
            try {
                showToast('Restarting backend...');
                await fetch('/api/restart', { method: 'POST' });
                // Wait for server to restart
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } catch (err) {
                showToast('Restart failed: ' + err.message);
            }
        }

        function refreshGraph() {
            d3.json('/api/graph').then(graph => {
                groupLabels = graph.groups || {};
                buildFilterUI(groupLabels);
                const MEMORY_RADIUS = 22;
                const sizes = graph.nodes.map(n => n.size || 0);
                const maxSize = Math.max(...sizes, 1);
                const sizeScale = d3.scaleSqrt().domain([0, maxSize]).range([5, MEMORY_RADIUS - 2]).clamp(true);
                allNodesData = graph.nodes.map(n => ({...n, customColor: null, r: n.id === 'MEMORY' ? MEMORY_RADIUS : sizeScale(n.size || 0)}));
                allLinksData = graph.links;
                updateFilter();
            });
        }

        function showToast(msg) {
            const t = document.getElementById('settings-toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Enter key to add path
        document.getElementById('new-path-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addPath();
        });

        // === Folder Browser Logic ===
        let _fbMode = 'scan'; // 'scan' or 'core'
        let _fbCurrentPath = '';

        function openFolderBrowser(mode) {
            _fbMode = mode;
            _fbCurrentPath = '';
            document.getElementById('folder-browser-overlay').classList.add('open');
            browseTo(''); // start at root / drives
        }

        function closeFolderBrowser() {
            document.getElementById('folder-browser-overlay').classList.remove('open');
        }

        async function browseTo(path) {
            const list = document.getElementById('fb-list');
            const pathEl = document.getElementById('fb-current-path');
            list.replaceChildren(createEmptyState('Loading...'));
            pathEl.textContent = path || 'My Computer';

            try {
                let browseUrl = '/api/browse?path=' + encodeURIComponent(path);
                if (_fbMode === 'core') browseUrl += '&show_files=1';
                const res = await fetch(browseUrl);
                const data = await res.json();
                if (data.error && !data.dirs) {
                    list.replaceChildren(createEmptyState(data.error));
                    return;
                }

                _fbCurrentPath = data.current || '';
                pathEl.textContent = _fbCurrentPath || 'My Computer';
                list.replaceChildren();
                if (data.parent !== null && data.parent !== undefined) {
                    list.appendChild(createFolderItem({
                        label: '../ (Parent)',
                        icon: '←',
                        className: 'fb-parent',
                        onClick: () => browseTo(data.parent)
                    }));
                } else if (!data.is_root && _fbCurrentPath) {
                    list.appendChild(createFolderItem({
                        label: 'Roots',
                        icon: '←',
                        className: 'fb-parent',
                        onClick: () => browseTo('')
                    }));
                }

                for (const dir of data.dirs) {
                    const fullPath = data.is_root ? dir : (_fbCurrentPath + '\\' + dir);
                    list.appendChild(createFolderItem({
                        label: dir,
                        icon: '📁',
                        onClick: () => browseTo(fullPath)
                    }));
                }
                if (data.files && data.files.length > 0) {
                    for (const file of data.files) {
                        const fullPath = _fbCurrentPath + '\\' + file;
                        list.appendChild(createFolderItem({
                            label: file,
                            icon: '📄',
                            className: 'fb-file',
                            onClick: () => selectFile(fullPath)
                        }));
                    }
                }
                if (!list.childNodes.length) {
                    list.appendChild(createEmptyState('Empty directory'));
                }
            } catch (err) {
                list.replaceChildren(createEmptyState(`Error: ${err.message}`));
            }
        }

        function selectFile(filePath) {
            if (_fbMode === 'core') {
                document.getElementById('core-mem-input').value = filePath;
            }
            closeFolderBrowser();
        }

        function selectCurrentFolder() {
            if (!_fbCurrentPath) return;
            if (_fbMode === 'scan') {
                const input = document.getElementById('new-path-input');
                input.value = _fbCurrentPath;
                addPath();
            } else if (_fbMode === 'core') {
                document.getElementById('core-mem-input').value = _fbCurrentPath;
            }
            closeFolderBrowser();
        }

        // Click file path to copy
        document.getElementById('panel-filepath').addEventListener('click', function() {
            if (appState.isGuestMode && !appState.uiConfig.show_file_paths_in_guest) return;
            const path = this.textContent;
            if (!path) return;
            navigator.clipboard.writeText(path).then(() => {
                const orig = this.textContent;
                this.textContent = 'Copied!';
                this.style.opacity = '1';
                setTimeout(() => { this.textContent = orig; this.style.opacity = ''; }, 1200);
            });
        });

        // === Search Dropdown Logic ===
        let _searchActiveIdx = -1;

        function updateSearchDropdown(term) {
            const dropdown = document.getElementById('search-dropdown');
            _searchActiveIdx = -1;
            const normalizedTerm = normalizeSearchText(term);
            if (!normalizedTerm) {
                dropdown.classList.remove('open');
                return;
            }

            const scored = allNodesData
                .map(n => {
                    const projection = buildSearchProjection(n.id);
                    const idx = projection.normalized.indexOf(normalizedTerm);
                    if (idx === -1) return null;
                    const startBonus = idx === 0 ? 1000 : 0;
                    const lengthPenalty = projection.normalized.length;
                    return {
                        node: n,
                        projection,
                        normalizedIndex: idx,
                        score: startBonus - lengthPenalty + (100 - idx)
                    };
                })
                .filter(Boolean)
                .sort((a, b) => b.score - a.score)
                .slice(0, 15);

            if (scored.length === 0) {
                dropdown.replaceChildren(createEmptyState('No results', 'search-no-result'));
                dropdown.classList.add('open');
                return;
            }

            dropdown.replaceChildren();
            scored.forEach((s, i) => {
                const name = s.node.id;
                const startOriginal = s.projection.indexMap[s.normalizedIndex];
                const endOriginal = s.projection.indexMap[s.normalizedIndex + normalizedTerm.length - 1];
                const before = startOriginal === undefined ? name : name.substring(0, startOriginal);
                const match = startOriginal === undefined || endOriginal === undefined
                    ? name
                    : name.substring(startOriginal, endOriginal + 1);
                const after = startOriginal === undefined || endOriginal === undefined
                    ? ''
                    : name.substring(endOriginal + 1);
                const groupName = groupLabels[s.node.group] || '';
                const item = document.createElement('div');
                item.className = 'search-item';
                item.dataset.id = name;
                item.dataset.index = i;

                const label = document.createElement('span');
                label.append(document.createTextNode(before));

                const matchEl = document.createElement('span');
                matchEl.className = 'match-highlight';
                matchEl.textContent = match;
                label.appendChild(matchEl);
                label.append(document.createTextNode(after));
                item.appendChild(label);

                if (groupName) {
                    const group = document.createElement('span');
                    group.className = 'search-group';
                    group.textContent = groupName;
                    item.appendChild(group);
                }

                item.addEventListener('click', () => selectSearchResult(name));
                dropdown.appendChild(item);
            });
            dropdown.classList.add('open');
        }

        function selectSearchResult(id) {
            document.getElementById('search-dropdown').classList.remove('open');
            document.getElementById('search-input').value = id;
            const target = allNodesData.find(n => n.id === id);
            if (target) {
                // Zoom to node
                const k = 2.5;
                const x = width / 2 - target.x * k;
                const y = height / 2 - target.y * k;
                svg.transition().duration(800).call(
                    d3.zoom().transform,
                    d3.zoomIdentity.translate(x, y).scale(k)
                );
                // Select node via selectNode (reuse full logic)
                const nodeEl = d3.selectAll('.node-group').filter(d => d.id === target.id);
                if (!nodeEl.empty()) {
                    selectNode(target, nodeEl.node());
                    // Add highlight pulse animation
                    nodeEl.select('circle').classed('search-highlight', false);
                    // Force reflow to restart animation
                    void nodeEl.select('circle').node().offsetWidth;
                    nodeEl.select('circle').classed('search-highlight', true);
                    setTimeout(() => nodeEl.select('circle').classed('search-highlight', false), 1500);
                }
            }
        }

        // Keyboard navigation in dropdown
        document.getElementById('search-input').addEventListener('keydown', (e) => {
            const dropdown = document.getElementById('search-dropdown');
            const items = dropdown.querySelectorAll('.search-item');
            if (!items.length || !dropdown.classList.contains('open')) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                _searchActiveIdx = Math.min(_searchActiveIdx + 1, items.length - 1);
                items.forEach((el, i) => el.classList.toggle('active', i === _searchActiveIdx));
                items[_searchActiveIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                _searchActiveIdx = Math.max(_searchActiveIdx - 1, 0);
                items.forEach((el, i) => el.classList.toggle('active', i === _searchActiveIdx));
                items[_searchActiveIdx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (_searchActiveIdx >= 0 && items[_searchActiveIdx]) {
                    selectSearchResult(items[_searchActiveIdx].dataset.id);
                }
            } else if (e.key === 'Escape') {
                dropdown.classList.remove('open');
            }
        });
    </script>
</body>
</html>
