<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e14">
    <title>Neural Cloud</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --accent: #00ffcc;
            --gold: #ffcc00;
            --bg: #0b0e14;
            --panel: rgba(18,22,30,0.96);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.18);
            --text-primary: #f0f0f0;
            --text-secondary: #aab;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-primary);
            font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #graph { width: 100vw; height: 100dvh; touch-action: none; }

        /* === Graph Elements === */
        .link { stroke: #333; stroke-opacity: 0.4; stroke-width: 1.2px; pointer-events: none; }
        .node { stroke: #fff; stroke-width: 1px; cursor: pointer; transition: all 0.25s ease; }
        .node.selected { stroke: var(--gold); stroke-width: 3px; filter: drop-shadow(0 0 10px var(--gold)); }
        .node.highlighted { stroke: var(--accent); stroke-width: 2px; filter: drop-shadow(0 0 8px var(--accent)); }

        .label-bg {
            fill: rgba(0,0,0,0.75); rx: 8; ry: 8;
            opacity: 0; pointer-events: none;
            stroke: var(--border); stroke-width: 0.5px;
            transition: opacity 0.25s ease;
        }
        .label-text {
            font-size: 12px; pointer-events: none;
            fill: #fff; opacity: 0;
            transition: opacity 0.25s ease;
        }
        .node-group.focused .label-bg, .node-group.focused .label-text,
        .node-group.selected .label-bg, .node-group.selected .label-text { opacity: 1 !important; }

        /* === Controls === */
        #controls-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 12px;
            z-index: 100; max-width: calc(100vw - 40px);
        }

        #search-input {
            width: 300px; max-width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            background: var(--panel);
            border: 1px solid var(--border);
            color: #fff; font-size: 14px;
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
            backdrop-filter: blur(12px);
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.12);
        }
        #search-input::placeholder { color: var(--text-secondary); }

        .glass-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-md);
            backdrop-filter: blur(12px);
        }

        .config-title {
            font-size: 11px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.2px;
            margin-bottom: 12px; font-weight: 600;
        }

        .filter-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary);
            padding: 6px 0; cursor: pointer;
            transition: color var(--transition-fast);
        }
        .filter-label:hover { color: var(--text-primary); }
        .filter-label input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* === Color Picker === */
        .color-picker { display: flex; gap: 10px; }
        .color-circle {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .color-circle:hover { transform: scale(1.15); }
        .color-circle.active {
            border-color: #fff; transform: scale(1.2);
            box-shadow: 0 0 12px rgba(255,255,255,0.4);
        }

        /* === Preview Panel (Desktop) === */
        #preview-panel {
            position: absolute; top: 16px; right: -900px;
            width: 480px; height: calc(100dvh - 32px);
            background: var(--panel); border: 1px solid var(--border);
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1), width 0.25s ease;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: -12px 0 40px rgba(0,0,0,0.5);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(25px);
            z-index: 1000;
        }
        #preview-panel.open { right: 16px; }

        #resizer {
            position: absolute; left: -2px; top: 0;
            width: 8px; height: 100%;
            cursor: ew-resize; background: transparent;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 12px;
        }
        .panel-header-top {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .panel-header-top h2 {
            margin: 0; font-size: 16px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; min-width: 0;
        }

        .actions-bar { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn {
            padding: 8px 16px; font-size: 12px; font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all var(--transition-fast);
            background: rgba(255,255,255,0.05);
            color: var(--text-secondary);
            text-decoration: none;
            white-space: nowrap;
            line-height: 1.4;
        }
        .btn:hover {
            background: var(--accent); color: #000;
            border-color: var(--accent);
        }
        .btn:active { transform: scale(0.96); }
        .btn-close {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            color: var(--text-primary);
        }

        .panel-content {
            padding: 24px; overflow-y: auto; flex: 1;
            font-size: 15px; line-height: 1.75; color: #ddd;
            -webkit-overflow-scrolling: touch;
        }
        .panel-content img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
        .panel-content pre { overflow-x: auto; border-radius: var(--radius-sm); }
        .panel-content code { font-size: 13px; }

        /* === Mobile Overlay === */
        #panel-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0; transition: opacity 0.25s ease;
        }
        #panel-overlay.visible { display: block; opacity: 1; }

        /* === Mobile Responsive === */
        @media (max-width: 768px) {
            #controls-container {
                top: 12px; left: 12px; right: 12px;
                max-width: none;
            }
            #search-input { width: 100%; font-size: 16px; }

            .glass-box { padding: 12px; }
            .filter-label { font-size: 14px; padding: 8px 0; }

            #preview-panel {
                top: auto; bottom: 0; right: 0; left: 0;
                width: 100% !important;
                height: 70dvh;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                transform: translateY(100%);
                transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            }
            #preview-panel.open {
                right: 0;
                transform: translateY(0);
            }

            #resizer { display: none; }

            .panel-header { padding: 16px; }
            .panel-header::before {
                content: '';
                display: block; width: 36px; height: 4px;
                background: rgba(255,255,255,0.2);
                border-radius: 2px;
                margin: 0 auto 12px;
            }
            .panel-content { padding: 16px; font-size: 15px; }

            .btn { padding: 10px 18px; font-size: 13px; }
        }

        /* === Loading State === */
        .panel-loading {
            display: flex; align-items: center; justify-content: center;
            height: 120px; color: var(--text-secondary);
        }
        .panel-loading::after {
            content: ''; width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="controls-container">
        <input type="text" id="search-input" placeholder="Search Neural Synapses..." autocomplete="off">
        <div class="glass-box">
            <div class="config-title">Filters</div>
            <label class="filter-label"><input type="checkbox" id="filter-core" checked> Core (MEMORY)</label>
            <label class="filter-label"><input type="checkbox" id="filter-logs" checked> Logs</label>
            <label class="filter-label"><input type="checkbox" id="filter-assets" checked> Assets</label>
            
            <div id="node-config" style="display:none; border-top: 1px solid var(--border); margin-top:12px; padding-top:12px;">
                <div class="config-title">Node Color</div>
                <div class="color-picker" id="node-color-picker">
                    <div class="color-circle" data-color="#42b983" style="background:#42b983" role="button" aria-label="Green"></div>
                    <div class="color-circle" data-color="#3498db" style="background:#3498db" role="button" aria-label="Blue"></div>
                    <div class="color-circle" data-color="#e74c3c" style="background:#e74c3c" role="button" aria-label="Red"></div>
                    <div class="color-circle" data-color="#9b59b6" style="background:#9b59b6" role="button" aria-label="Purple"></div>
                    <div class="color-circle" data-color="#f1c40f" style="background:#f1c40f" role="button" aria-label="Yellow"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-overlay" onclick="closePanel()"></div>
    <div id="preview-panel">
        <div id="resizer"></div>
        <div class="panel-header">
            <div class="panel-header-top">
                <h2 id="panel-title"></h2>
                <button class="btn btn-close" onclick="closePanel()" aria-label="Close panel">CLOSE</button>
            </div>
            <div class="actions-bar">
                <a id="btn-raw-pdf" class="btn" target="_blank" style="display:none; color:var(--gold); border-color:var(--gold);">VIEW PDF</a>
                <button class="btn btn-reset-width" onclick="resetWidth()">RESET WIDTH</button>
            </div>
        </div>
        <div id="panel-body" class="panel-content">Select a node...</div>
    </div>
    
    <svg id="graph"></svg>

    <script>
        const svg = d3.select("#graph"), width = window.innerWidth, height = window.innerHeight;
        const g = svg.append("g");
        const panel = document.getElementById("preview-panel");
        let allNodesData = [], allLinksData = [], curNodes = [], curLinks = [], selectedId = null;
        
        let simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(220))
            .force("charge", d3.forceManyBody().strength(-800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => (d.r || 8) + 30));

        d3.json("/api/graph").then(graph => {
            // Compute node radius based on file size using sqrt scale, capped below MEMORY node
            const MEMORY_RADIUS = 22;
            const sizes = graph.nodes.map(n => n.size || 0);
            const maxSize = Math.max(...sizes, 1);
            const sizeScale = d3.scaleSqrt().domain([0, maxSize]).range([5, MEMORY_RADIUS - 2]).clamp(true);
            allNodesData = graph.nodes.map(n => ({...n, customColor: null, r: n.id === 'MEMORY' ? MEMORY_RADIUS : sizeScale(n.size || 0)}));
            allLinksData = graph.links;
            updateFilter();
            setupInteractions();
        });

        function renderGraph(nodes, links) {
            const linkSelection = g.selectAll(".link").data(links, d => (d.source.id || d.source) + "-" + (d.target.id || d.target));
            linkSelection.exit().remove();
            const link = linkSelection.enter().insert("line", ":first-child").attr("class", "link").merge(linkSelection);

            const groupSelection = g.selectAll(".node-group").data(nodes, d => d.id);
            groupSelection.exit().remove();
            const nodeGroup = groupSelection.enter().append("g").attr("class", "node-group")
                .on("click", (e, d) => selectNode(d, e.currentTarget))
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
                .merge(groupSelection);

            nodeGroup.each(function(d) {
                const el = d3.select(this);
                if (el.select("circle").empty()) {
                    el.append("circle").attr("class", "node");
                    el.append("rect").attr("class", "label-bg");
                    el.append("text").attr("class", "label-text").attr("dx", 18).attr("dy", 4);
                }
                
                el.select("circle")
                    .attr("r", d.r || 8)
                    .attr("fill", d.customColor || (d.id === "MEMORY" ? "var(--gold)" : (d.group === 1 ? "#42b983" : "#3498db")))
                    .classed("selected", d.id === selectedId);

                el.select("text").text(d.id.length > 25 ? d.id.substr(0,22)+'...' : d.id);
                const bbox = el.select("text").node().getBBox();
                el.select("rect").attr("x", bbox.x - 6).attr("y", bbox.y - 3).attr("width", bbox.width + 12).attr("height", bbox.height + 6);
            });

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(0.3).restart();

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function selectNode(d, el) {
            selectedId = d.id;
            d3.selectAll(".node-group").classed("selected", false);
            d3.select(el).classed("selected", true);
            
            const config = document.getElementById("node-config");
            config.style.display = "block";
            
            // Sync active color
            document.querySelectorAll(".color-circle").forEach(c => {
                c.classList.toggle("active", c.getAttribute("data-color") === d.customColor);
            });

            openNode(d.id);
        }

        function setupInteractions() {
            // Fix Color Picker
            document.querySelectorAll(".color-circle").forEach(c => {
                c.onclick = (e) => {
                    e.stopPropagation();
                    const color = c.getAttribute("data-color");
                    const node = allNodesData.find(n => n.id === selectedId);
                    if (node) {
                        node.customColor = (node.customColor === color) ? null : color;
                        renderGraph(curNodes, curLinks);
                        // Refresh picker UI
                        document.querySelectorAll(".color-circle").forEach(cc => {
                            cc.classList.toggle("active", cc.getAttribute("data-color") === node.customColor);
                        });
                    }
                };
            });

            ["filter-core","filter-logs","filter-assets"].forEach(id => document.getElementById(id).addEventListener("change", updateFilter));
            document.getElementById("search-input").oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const target = allNodesData.find(n => n.id.toLowerCase().includes(term));
                if (target) { const k = 2.0; const x = width/2 - target.x*k; const y = height/2 - target.y*k; svg.transition().duration(800).call(d3.zoom().transform, d3.zoomIdentity.translate(x,y).scale(k)); }
            };
        }

        const isMobile = () => window.innerWidth <= 768;
        const overlay = document.getElementById("panel-overlay");

        async function openNode(id) {
            panel.classList.add("open");
            if (isMobile()) overlay.classList.add("visible");
            document.getElementById("panel-title").innerText = id;
            const pdfBtn = document.getElementById("btn-raw-pdf"); pdfBtn.style.display = "none";
            document.getElementById("panel-body").innerHTML = '<div class="panel-loading"></div>';
            try {
                const response = await fetch(`/api/content?id=` + encodeURIComponent(id));
                const data = await response.json();
                document.getElementById("panel-body").innerHTML = marked.parse(data.content || "# No Data");
                if (data.pdf_link) { pdfBtn.href = data.pdf_link; pdfBtn.style.display = "inline-flex"; }
                document.querySelectorAll('pre code').forEach(c => hljs.highlightElement(c));
                if (window.MathJax) MathJax.typesetPromise();
            } catch (err) {
                document.getElementById("panel-body").innerHTML = '<p style="color:var(--text-secondary)">Failed to load content.</p>';
            }
        }

        function updateFilter() {
            const showC = document.getElementById("filter-core").checked, showL = document.getElementById("filter-logs").checked, showA = document.getElementById("filter-assets").checked;
            curNodes = allNodesData.filter(n => (n.id==="MEMORY"?showC : (n.group===1?showL : showA)));
            const ids = new Set(curNodes.map(n => n.id));
            curLinks = JSON.parse(JSON.stringify(allLinksData)).filter(l => ids.has(l.source) && ids.has(l.target));
            renderGraph(curNodes, curLinks);
        }

        function closePanel() {
            panel.classList.remove("open");
            overlay.classList.remove("visible");
            selectedId = null;
            d3.selectAll(".node-group").classed("selected", false);
            document.getElementById("node-config").style.display = "none";
        }
        function resetWidth() { if (!isMobile()) panel.style.width = "480px"; }
        let isR = false; resizer.onmousedown = () => isR = true;
        document.onmousemove = (e) => { if(!isR)return; const nw = window.innerWidth - e.clientX; if(nw>300 && nw < window.innerWidth*0.8) panel.style.width = nw+"px"; };
        document.onmouseup = () => isR = false;

        svg.call(d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => {
            g.attr("transform", e.transform);
            const {k,x,y} = e.transform;
            g.selectAll(".node-group").each(function(d){
                const sx = d.x*k+x, sy = d.y*k+y;
                const vis = k>=1.8 && Math.abs(sx-width/2)<width*0.22 && Math.abs(sy-height/2)<height*0.22;
                d3.select(this).classed("focused", d.id === selectedId || vis);
            });
        }));

        function dragstarted(e,d){ if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
        function dragged(e,d){ d.fx=e.x; d.fy=e.y; }
        function dragended(e,d){ if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }
    </script>
</body>
</html>
